<!DOCTYPE html>
<html>

<head>
    <title>Food Rescue Network</title>
</head>

<body>

<h2>Food Donation Form</h2>

<form id="donationForm">

<label>Food Type:</label><br>
<input type="text" id="food_type"><br><br>

<label>Quantity:</label><br>
<input type="number" id="quantity"><br><br>

<label>Location:</label><br>
<input type="text" id="location"><br><br>

<label>Latitude:</label><br>
<input type="text" id="latitude"><br><br>

<label>Longitude:</label><br>
<input type="text" id="longitude"><br><br>

<button type="submit">Donate Food</button>

</form>

<p id="result"></p>

<script>

document.getElementById("donationForm").addEventListener("submit", async function(e){

e.preventDefault();

const data = {

donor_id: "123",

food_type: document.getElementById("food_type").value,

quantity: document.getElementById("quantity").value,

location: document.getElementById("location").value,

latitude: document.getElementById("latitude").value,

longitude: document.getElementById("longitude").value,

expiry_time: new Date()

};

const response = await fetch("http://localhost:5000/api/donate",{

method:"POST",

headers:{
"Content-Type":"application/json"
},

body: JSON.stringify(data)

});

const result = await response.json();

document.getElementById("result").innerText = result.message;

});

</script>

</body>

</html>
